name: al-hadith
adopt-info: al-hadith
summary: A beautiful Hadith application with search and bookmarking features
description: |
  Al Hadith is a comprehensive, modern, and beautiful Hadith application
  designed to help users read, search, and bookmark Hadith with ease.

confinement: strict
base: core22
grade: stable

slots:
  dbus-al-hadith:
    interface: dbus
    bus: session
    name: com.ismail.al_hadith

apps:
  al-hadith:
    command: al_hadith
    extensions: [gnome]
    plugs:
      - network
    slots:
      - dbus-al-hadith

parts:
  al-hadith:
    plugin: dump
    source: build/linux/x64/release/bundle
    stage-packages:
      - libsqlite3-0
    override-pull: |
      # Extract version from pubspec.yaml
      VERSION=$(grep '^version: ' "${CRAFT_PROJECT_DIR}/pubspec.yaml" | cut -d' ' -f2 | cut -d'+' -f1)
      craftctl set version="$VERSION"
