name: al_hadith
version: 1.0.0
summary: Generated by Icons Launcher
description: Generated by Icons Launcher package for Linux.

confinement: strict
base: core22
grade: stable

slots:
  dbus-al_hadith: # adjust accordingly to your app name
    interface: dbus
    bus: session
    name: org.bar.al_hadith # adjust accordingly to your app name

apps:
  al_hadith:
    command: al_hadith
    extensions: [gnome] # gnome includes the libraries required by flutter
    plugs:
    - network
    slots:
      - dbus-al_hadith
parts:
  al_hadith:
    source: .
    plugin: flutter
    flutter-target: lib/main.dart # The main entry-point file of the application
